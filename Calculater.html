<html><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
        <title>Calculater</title>

        <!-- internal css -->
    <style>
        html,body{
            background:linear-gradient(45deg,#0a0a0a,#3a4452);
            align-items:center;
            justify-content:center;
            display:flex;
            width:100%;
            height:100%;
            border:1px solid black;
        }
           
        input{
             width:90%;
             height:25%;
             border-radius:20px;  
            background:transparent; 
            box-shadow:0px 2px 5px rgba(113,115,119,0.5);
            margin-top:10px;
            cursor:pointer;
            margin-left:10px;
            color:white;
        }
        .div{
         width:38%;
         height:90%;
          border:1px solid gray;
          border-radius:20px;
          box-shadow:0px 2px 5px rgba(113,115,119,0.5);
        }
        button{
            width:50px;
           margin:15px;
           margin-bottom:8px;
           height:10%;
           border-radius:50%;
           margin-left:25px;
           cursor:pointer;
           font-size:20px;
           background:transparent;
           border:none;
           color:white;
           border:1px solid gray;
           box-shadow:-8px -20px 15px rgba(255,green,blue,alpha);
        }
        .operator{
            color:rgb(7, 241, 7);
        }
        .equalBtn{
            background-color:rgb(237, 157, 9);
        }
    </style></head>
    
    <body>
       <div class="div">
        <input type="text" placeholder="0" id="inputbox">
        <div> 
        <button class="operator">AC</button>
        <button class="operator">DE</button>
        <button class="operator">%</button>
        <button>/</button>
       </div>

       <div> 
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">*</button>
       </div>

       <div> 
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">-</button>
       </div>
        

       <div> 
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>
       </div>
       <div> 
        <button>00</button>
        <button>0</button>
        <button>.</button>
        <button class="equalBtn">=</button>
       </div>
    </div>

    <script src="calculator.js"></script>

   
    

        </body></html>
